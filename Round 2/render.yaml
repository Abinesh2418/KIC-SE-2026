databases:
  - name: mlfest-db
    plan: free
    databaseName: mlfest
    user: mlfest

services:
  - type: web
    plan: free
    name: mlfest
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      python manage.py setup_challenges
    startCommand: gunicorn mlfest.wsgi
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: mlfest-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.13.5"
