{% extends 'debugchallenge/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container-sm fade-in">
    <div class="card-wrap">
        <div class="card-shadow"></div>
        <div class="card">
            <div class="text-center" style="margin-bottom: 24px;">
                <h2 style="font-weight: 900; letter-spacing: -0.5px;">Welcome <span class="text-accent">Back</span></h2>
                <p class="text-muted mt-2" style="font-size: 14px;">Login to continue</p>
            </div>

            <form method="post" action="{% url 'debugchallenge:login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Username or Email</label>
                    {{ form.username }}
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    {{ form.password }}
                </div>
                <div class="btn-wrap" style="width: 100%;">
                    <div class="btn-shadow" style="border-radius: 4px;"></div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                </div>
            </form>
            <p class="text-center mt-4" style="font-size: 14px; color: var(--text-secondary);">
                New here? <a href="{% url 'debugchallenge:register' %}" style="color: var(--accent-red); text-decoration: none; font-weight: 700;">Register</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
