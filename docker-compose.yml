# ============================================================
# KIC-AIML-2026 — Production Docker Compose
# ============================================================
# 1 PostgreSQL server (port 15432) — 1 database
# 1 Django app: KIC AI/ML Assessment (port 11000)
# ============================================================

services:

  # ── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kic_aiml_r1
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-iqube@KIC2026}
    ports:
      - "${DB_EXTERNAL_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── KIC AI/ML Assessment (port 11000) ───────────────────
  round1:
    build:
      context: .
      dockerfile: Round 1/Dockerfile.prod
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/app/entrypoint.prod.sh"]
    ports:
      - "${ROUND1_PORT:-11000}:8000"
    environment:
      - DB_NAME=kic_aiml_r1
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-iqube@KIC2026}
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=${SECRET_KEY:-KiC-AiMl-2026-Pr0dSecReT-xZ9wV7mN4bQ8cJ2p}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-iqube@kic.ac.in}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-iqube@KIC2026}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-iqube@kic.ac.in}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-8}
    volumes:
      - round1_mcq:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8000),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  pgdata:
  round1_mcq: