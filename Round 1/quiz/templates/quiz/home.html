{% extends 'quiz/base.html' %}

{% block title %}Welcome{% endblock %}

{% block content %}
<div class="hero fade-in">
    <div style="margin-bottom: 20px;">
        <span class="sparkle sparkle-red" style="width: 14px; height: 14px;"></span>
        &nbsp;
        <span class="sparkle sparkle-green" style="width: 14px; height: 14px; animation-delay: 0.3s;"></span>
    </div>
    <h1>KIC <span class="accent">SE</span></h1>
    <p>Software Engineering Assessment 2026 &mdash; Test your knowledge.<br>
    <span style="color: var(--text-muted); font-size: 14px;">Organized by <strong>iQube - KIC</strong></span></p>
    <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
        <div class="btn-wrap">
            <div class="btn-shadow"></div>
            <a href="{% url 'quiz:register' %}" class="btn btn-primary" style="padding: 14px 36px; font-size: 16px; letter-spacing: 0.5px;">Register Now</a>
        </div>
        <div class="btn-wrap">
            <div class="btn-shadow"></div>
            <a href="{% url 'quiz:login' %}" class="btn btn-outline" style="padding: 14px 36px; font-size: 16px;">Login</a>
        </div>
    </div>
</div>

<div class="container">
    <div class="grid-2">
        <div class="stat-card-wrap fade-in">
            <div class="stat-shadow"></div>
            <div class="stat-card">
                <div class="stat-value text-accent">75</div>
                <div class="stat-label">Questions</div>
            </div>
        </div>
        <div class="stat-card-wrap fade-in" style="animation-delay: 0.1s;">
            <div class="stat-shadow"></div>
            <div class="stat-card">
                <div class="stat-value text-orange">MCQ</div>
                <div class="stat-label">Format</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
