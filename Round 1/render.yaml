databases:
  - name: kic-aiml-db
    plan: free
    databaseName: software_engineer
    user: software_engineer

services:
  - type: web
    plan: free
    name: kic-aiml-2026
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      python manage.py import_questions
    startCommand: gunicorn software_engineer.wsgi
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: kic-aiml-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.13.5"
